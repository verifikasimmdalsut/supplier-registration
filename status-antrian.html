<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Status Antrian — AEON</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .antrian-list{
            max-width: 520px;
            margin: 0 auto;
        }
        .antrian-row{
            display:flex;
            align-items:center;
            gap:14px;
            background:#fff;
            border:1.5px solid var(--pink-100);
            border-radius:14px;
            padding:12px 16px;
            margin-bottom:10px;
            transition: background .2s ease, border-color .2s ease, transform .2s ease;
        }
        .antrian-row.mine{
            background: linear-gradient(135deg, var(--pink-100), var(--pink-50));
            border-color: var(--magenta-bright);
            box-shadow: 0 8px 20px -8px rgba(155,20,104,0.3);
            transform: scale(1.02);
        }
        .antrian-badge{
            flex-shrink:0;
            min-width:64px;
            text-align:center;
            font-family:'Poppins', sans-serif;
            font-weight:700;
            font-size:14px;
            padding:8px 10px;
            border-radius:10px;
            background: var(--pink-100);
            color: var(--magenta);
        }
        .antrian-badge.badge-merah{ background:#fbcaca; color:#c81414; }
        .antrian-badge.badge-kuning{ background:#fbe4a3; color:#8a6200; }
        .antrian-badge.badge-hijau{ background:#b9ecd4; color:#0e6b47; }
        .antrian-badge.badge-putih{ background:#e6e6e6; color:#4a4a4a; }
        .antrian-badge.badge-express{ background:#fbcae7; color:#a3106d; }
        .antrian-info{ flex:1; min-width:0; }
        .antrian-nama{
            font-weight:700;
            font-size:14px;
            color:var(--ink);
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .antrian-tahap{
            font-size:12px;
            color:var(--ink-soft);
            margin-top:2px;
        }
        .antrian-row.mine .antrian-tahap{
            color: var(--magenta);
            font-weight:600;
        }
        .empty-state{
            text-align:center;
            padding: 40px 20px;
            color: var(--ink-soft);
        }
        .live-dot{
            display:inline-block;
            width:8px;
            height:8px;
            border-radius:50%;
            background:#1f9d6b;
            margin-right:6px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot{
            0%,100%{ opacity:1; }
            50%{ opacity:0.3; }
        }
    </style>

</head>

<body>

<div class="butterfly"><img src="kupu-kupu.gif" alt=""></div>
<div class="butterfly butterfly2"><img src="kupu-kupu.gif" alt=""></div>

<div class="container py-5">

    <div class="register-card" style="max-width:560px;">

        <div class="text-center mb-4">
            <div class="logo-wrap">
                <img src="aeon-logo.png" alt="AEON" class="aeon-header-logo">
                <span class="fly-butterfly fly-1"><img src="kupu-kupu.gif" alt=""></span>
                <span class="fly-butterfly fly-2"><img src="kupu-kupu.gif" alt=""></span>
            </div>
            <h2 class="title">Status Antrian</h2>
            <p class="subtitle" id="subtitleWarna">AEON Alam Sutera</p>
        </div>

        <div class="text-center mb-3" style="font-size:12.5px; color:var(--ink-soft);">
            <span class="live-dot"></span>Update otomatis tiap 8 detik
        </div>

        <div id="antrianList" class="antrian-list">
            <div class="empty-state">Memuat data antrian...</div>
        </div>

    </div>

</div>

<script>
// GANTI dengan Web App URL hasil deploy google-apps-script-status-antrian.gs
const STATUS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6RBKQu_XrNkzFzDa5zG-iYIuEUrNgFZxaThLWB--xkxMl_Mr7nkDft8wmoqWj9hU/exec';

const params = new URLSearchParams(window.location.search);
const myNoAntrian = (params.get('no') || '').trim().toUpperCase();

function extractWarna(noAntrian){
    const match = String(noAntrian || '').trim().toUpperCase().match(/[A-Z]+$/);
    return match ? match[0] : '';
}

const myWarna = extractWarna(myNoAntrian);

if(myWarna){
    document.getElementById('subtitleWarna').textContent = 'Antrian Warna ' + myWarna;
}

const listEl = document.getElementById('antrianList');

function renderList(data){
    // Kalau ada info warna sendiri (dari tiket), cuma tampilin antrian warna yang sama
    const filtered = myWarna
        ? data.filter(item => extractWarna(item.noAntrian) === myWarna)
        : data;

    if(!filtered || filtered.length === 0){
        listEl.innerHTML = '<div class="empty-state">Tidak ada antrian warna ' + (myWarna || 'ini') + ' yang sedang berjalan saat ini.</div>';
        return;
    }

    listEl.innerHTML = filtered.map(item => {
        const isMine = item.noAntrian.trim().toUpperCase() === myNoAntrian && myNoAntrian !== '';
        const warnaClass = 'badge-' + extractWarna(item.noAntrian).toLowerCase();
        return `
            <div class="antrian-row ${isMine ? 'mine' : ''}">
                <div class="antrian-badge ${warnaClass}">${item.noAntrian}</div>
                <div class="antrian-info">
                    <div class="antrian-nama">${item.namaSupplier}</div>
                    <div class="antrian-tahap">${item.tahap}${isMine ? ' · Ini kendaraan kamu' : ''}</div>
                </div>
            </div>
        `;
    }).join('');
}

async function loadStatus(){
    try{
        const response = await fetch(STATUS_SCRIPT_URL);
        const result = await response.json();
        if(result.success){
            renderList(result.data);
        } else {
            listEl.innerHTML = '<div class="empty-state">Gagal memuat data. Coba lagi sebentar.</div>';
        }
    }catch(err){
        console.error(err);
        listEl.innerHTML = '<div class="empty-state">Gagal terhubung ke server. Coba lagi sebentar.</div>';
    }
}

loadStatus();
setInterval(loadStatus, 8000);
</script>

</body>

</html>
