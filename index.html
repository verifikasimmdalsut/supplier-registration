<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrasi Supplier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="butterfly"></div>
<div class="butterfly butterfly2"></div>

<div class="container py-5">

    <div class="register-card">

        <div class="text-center mb-4">

            <div class="logo-circle">

                🦋

            </div>

            <h2 class="title">

                Registrasi Supplier

            </h2>

            <p class="subtitle">

                AEON Alam Sutera

            </p>

        </div>

        <form id="formRegistrasi">

            <!-- =============================== -->
            <!-- KODE SUPPLIER -->
            <!-- =============================== -->

            <div class="mb-4">

                <label class="form-label">

                    Kode Supplier

                </label>

                <input

                    type="text"

                    id="kode_supplier"

                    class="form-control modern-input"

                    placeholder="Masukkan kode supplier"

                    autocomplete="off">

                <div

                    id="supplierStatus"

                    class="status-text">

                    Ketik kode supplier...

                </div>

            </div>

            <!-- =============================== -->
            <!-- CARD SUPPLIER -->
            <!-- =============================== -->

            <div

                id="supplierCard"

                class="supplier-card"

                style="display:none;">

                <div class="supplier-icon">

                    🏢

                </div>

                <div class="supplier-content">

                    <div class="supplier-label">

                        Nama Supplier

                    </div>

                    <div

                        id="nama_supplier"

                        class="supplier-name">

                        -

                    </div>

                    <small>

                        Data supplier otomatis dari database

                    </small>

                </div>
            <!-- =============================== -->
            <!-- NOMOR KENDARAAN -->
            <!-- =============================== -->

            <div class="mb-3">

                <label class="form-label">

                    Nomor Kendaraan

                </label>

                <input
                    type="text"
                    id="nomor_kendaraan"
                    class="form-control modern-input"
                    placeholder="Contoh : B1234ABC">

            </div>

            <!-- =============================== -->
            <!-- NAMA SUPIR -->
            <!-- =============================== -->

            <div class="mb-3">

                <label class="form-label">

                    Nama Supir

                </label>

                <input
                    type="text"
                    id="nama_supir"
                    class="form-control modern-input"
                    placeholder="Masukkan nama supir">

            </div>

            <!-- =============================== -->
            <!-- NO IDENTITAS -->
            <!-- =============================== -->

            <div class="mb-3">

                <label class="form-label">

                    Nomor Identitas

                </label>

                <input
                    type="text"
                    id="no_identitas"
                    class="form-control modern-input"
                    placeholder="Masukkan nomor identitas">

            </div>

            <!-- =============================== -->
            <!-- NO HP -->
            <!-- =============================== -->

            <div class="mb-3">

                <label class="form-label">

                    Nomor HP

                </label>

                <input
                    type="text"
                    id="no_hp"
                    class="form-control modern-input"
                    placeholder="08xxxxxxxxxx">

            </div>

            <!-- =============================== -->
            <!-- JENIS KENDARAAN -->
            <!-- =============================== -->

            <div class="mb-3">

                <label class="form-label">

                    Jenis Kendaraan

                </label>

                <select
                    id="jenis_kendaraan"
                    class="form-select modern-input">

                    <option value="">Pilih Jenis Kendaraan</option>

                    <option>Box</option>

                    <option>Pickup</option>

                    <option>Motor</option>

                    <option>Tronton</option>

                </select>

            </div>

            <!-- =============================== -->
            <!-- WARNA ANTRIAN -->
            <!-- =============================== -->

            <div class="mb-4">

                <label class="form-label">

                    Warna Antrian

                </label>

                <select
                    id="warna_antrian"
                    class="form-select modern-input">

                    <option>MERAH</option>

                    <option>KUNING</option>

                    <option>HIJAU</option>

                    <option>PUTIH</option>

                    <option>EXPRESS</option>

                </select>

            </div>

            <!-- =============================== -->
            <!-- BUTTON -->
            <!-- =============================== -->

            <button
                type="submit"
                class="btn btn-register">

                🦋 DAFTARKAN

            </button>
                <!-- ========================================= -->
<!-- MODAL TIKET -->
<!-- ========================================= -->

<div
    class="modal fade"
    id="ticketModal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content ticket-modal">

            <div class="modal-body text-center p-4">

                <div class="success-icon">
            </div>
