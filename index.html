<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Supplier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Registrasi Supplier
        </h2>

        <form id="formRegistrasi">

            <div class="mb-3">
                <label>Kode Supplier</label>
                <input type="text" id="kode_supplier" class="form-control">
            </div>

            <div class="mb-3">
                <label>Nama Supplier</label>
                <input type="text" id="nama_supplier" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label>Nomor Kendaraan</label>
                <input type="text" id="nomor_kendaraan" class="form-control">
            </div>

            <div class="mb-3">
                <label>Nama Supir</label>
                <input type="text" id="nama_supir" class="form-control">
            </div>

            <div class="mb-3">
                <label>No Identitas</label>
                <input type="text" id="no_identitas" class="form-control">
            </div>

            <div class="mb-3">
                <label>No HP</label>
                <input type="text" id="no_hp" class="form-control">
            </div>

            <div class="mb-3">
                <label>Jenis Kendaraan</label>
                <select id="jenis_kendaraan" class="form-select">
                    <option>Box</option>
                    <option>Pickup</option>
                    <option>Motor</option>
                    <option>Tronton</option>
                </select>
            </div>

            <div class="mb-4">
                <label>Warna Antrian</label>
                <select id="warna_antrian" class="form-select">
                    <option>MERAH</option>
                    <option>KUNING</option>
                    <option>HIJAU</option>
                    <option>PUTIH</option>
                    <option>EXPRESS</option>
                </select>
            </div>

            <button type="submit" class="btn btn-danger w-100">
                DAFTAR
            </button>

        </form>

    </div>

</div>

<!-- ========================= -->
<!-- MODAL TIKET -->
<!-- ========================= -->

<div class="modal fade" id="ticketModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content rounded-4 shadow">

            <div class="modal-body text-center p-4">

                <h3 class="fw-bold text-success mb-4">
                    REGISTRASI BERHASIL
                </h3>

                <div class="text-secondary fw-bold mb-2">
                    NOMOR ANTRIAN
                </div>

                <div
                    id="ticketNumber"
                    class="rounded-4 py-4 mb-3 fw-bold"
                    style="
                    font-size:72px;
                    color:white;
                    ">
                </div>

                <h3
                    id="ticketKategori"
                    class="fw-bold mb-4">
                </h3>

                <hr>

                <p class="fs-5">

                    Harap menunggu di area tunggu hingga
                    nomor antrean Anda dipanggil oleh
                    <strong>Checker</strong>
                    untuk proses pembongkaran barang.

                </p>

                <hr>

                <h5 class="fw-bold">
                    MMD AEON ALAM SUTERA
                </h5>

                <button
                    class="btn btn-dark mt-3 px-5"
                    data-bs-dismiss="modal">

                    Tutup

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
